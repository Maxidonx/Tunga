{% extends "base.html" %}

{% block title %}Home - My Flask Blog{% endblock %}

{% block content %}
<h1 class="mb-4">Recent Posts</h1>
{% for post in posts %}
<div class="card mb-3">
    <div class="card-body">
        <h5 class="card-title">{{ post.title }}</h5>
        <p class="card-text">{{ post.content[:100] }}...</p>
        <a href="{{ url_for('get_post', post_id=post.id) }}" class="btn btn-primary">Read More</a>
        <a href="{{ url_for('edit_post', post_id=post.id) }}" class="btn btn-warning">Edit</a>
        <form action="{{ url_for('delete_post', post_id=post.id) }}" method="POST" class="delete-form" style="display:inline;">
            <button type="submit" class="btn btn-danger">Delete</button>
        </form>
    </div>
</div>
{% endfor %}
{% endblock %}
